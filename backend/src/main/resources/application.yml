server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    # Drain (swallow) an aborted upload's in-flight remainder up to this size so a multipart-limit
    # rejection returns a clean 413 to a STREAMING browser instead of resetting the connection mid-upload
    # (the cause of the "đang tải lên" hang — see reports/c3-attachment-oversize-hang-diagnosis.md). FINITE
    # and >= multipart max-request-size (55MB); NOT -1, so anything past the nginx edge cap stays
    # edge-rejected rather than drained unbounded (DoS guard).
    max-swallow-size: 60MB

spring:
  application:
    name: gemek-backend
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gemek}
    username: ${DB_USER:gemek}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 55MB

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        type:
          preferred_enum_jdbc_type: NAMED_ENUM
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  # Host presigned GET URLs are signed for (browser-reachable; MinIO fronted by nginx).
  # Unset -> falls back to `endpoint` (presign unchanged). Dev: http://localhost:8090.
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:gemek}
  # Pin region so presign never makes a GetBucketLocation network call (offline signing).
  region: ${MINIO_REGION:us-east-1}

app:
  admin:
    email: ${ADMIN_EMAIL:admin@gemek.vn}
    password: ${ADMIN_PASSWORD:}
  auth:
    # Secure attribute on the httpOnly refresh cookie (hardening H3, E2=Option 1).
    # MUST be true behind https (prod); MUST stay false for the http dev/demo
    # deployment on :80/:81 — a Secure cookie is never sent over http, which
    # would lock out every login. Set AUTH_COOKIE_SECURE=true in the prod env.
    cookie-secure: ${AUTH_COOKIE_SECURE:false}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  enabled: ${FIREBASE_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    vn.vtit.gemek: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
