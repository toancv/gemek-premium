worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    client_max_body_size 20m;
    sendfile on;
    keepalive_timeout 65;

    # ── Admin portal (port 80) ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html/admin;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
        }

        location /swagger-ui/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api-docs/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /actuator/health {
            proxy_pass http://backend:8080;
            access_log off;
        }
    }

    # ── Resident portal (port 81) ─────────────────────────────────────────
    server {
        listen 81;
        server_name _;
        root /usr/share/nginx/html/resident;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
        }

        location /actuator/health {
            proxy_pass http://backend:8080;
            access_log off;
        }
    }

    # ── MinIO presign delivery (port 8090) ────────────────────────────────
    # Fronts the internal MinIO S3 API (minio:9000) on a host-reachable port so the browser can
    # fetch presigned announcement/ticket media. Raw 9000 is deliberately NOT published — this is
    # the only host path to object bytes. Presigned URLs are self-authenticating + short-lived, so
    # no extra auth is added here. CRITICAL: forward the FULL Host header INCLUDING port
    # ($http_host, not $host) — the presign signs SignedHeaders=host for `localhost:8090`, so the
    # forwarded host must match byte-for-byte or MinIO returns 403 SignatureDoesNotMatch.
    server {
        listen 8090;
        server_name _;
        client_max_body_size 50m;

        location / {
            proxy_pass http://minio:9000;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }
    }
}
