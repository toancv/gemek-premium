# Minimal dev-only compose: fresh postgres on 5434, no minio/nginx required.
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  postgres-dev:
    image: postgres:15.18-alpine
    container_name: gemek-postgres-dev
    environment:
      POSTGRES_DB: gemek
      POSTGRES_USER: gemek
      POSTGRES_PASSWORD: LocalDev@2026
    ports:
      - "5434:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gemek -d gemek"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
