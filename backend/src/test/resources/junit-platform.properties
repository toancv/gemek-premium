# TEST.1b — randomized execution order to continuously prove suite order-independence.
# Class and method order are randomized (fresh seed each run) so any future order-coupling
# regression surfaces as a failure. Test isolation (per-class @Transactional rollback, plus the
# per-JVM Flyway clean in AbstractIntegrationTest) makes the suite robust under any order.
junit.jupiter.testclass.order.default = org.junit.jupiter.api.ClassOrderer$Random
junit.jupiter.testmethod.order.default = org.junit.jupiter.api.MethodOrderer$Random
