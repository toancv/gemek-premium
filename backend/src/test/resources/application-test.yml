      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ""

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: gemek-test

firebase:
  enabled: false

logging:
  level:
    root: WARN
    vn.vtit.gemek: INFO
