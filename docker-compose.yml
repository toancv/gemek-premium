# =============================================================================
# Gemek Premium — Docker Compose
# Single-command startup: docker compose up -d --build
# All secrets loaded from .env (never committed to source control).
#
# Ports exposed on host:
#   80   → Admin portal  (nginx → React admin app)
#   81   → Resident portal (nginx → React resident app)
#   9001 → MinIO console (first-run bucket setup only)
# =============================================================================

services:

  postgres:
    image: postgres:15.18-alpine
    container_name: gemek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gemek
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gemek-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d gemek"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    container_name: gemek-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - gemek-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: gemek-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - gemek-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gemek-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gemek
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - gemek-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: gemek-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gemek-network

networks:
  gemek-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
